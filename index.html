<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小白团子 Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="stars-container"></div>
    <div id="orb-container"></div>
    
    <div class="top-ui">
        <!-- 左侧徽章 -->
        <div class="memory-badge" id="badge-ui">...</div>
        
        <!-- 右侧工具栏：已改为横向容器 -->
        <div class="right-tools">
            <div class="tool-container">
                <div class="tool-btn" onclick="toggleMenu('bag-menu')">🎒</div>
                <div id="bag-menu" class="pop-menu">
                    <a href="https://www.instagram.com/advicewithanson/" target="_blank" class="menu-item" style="color:#f43f5e; font-weight:bold;">✨ Anson 的小站</a>
                    <div class="menu-item" onclick="giveGift('🍪', '小饼干')">🍪 投喂饼干</div>
                    <div class="menu-item" onclick="giveGift('🍵', '热茶')">🍵 倒杯热茶</div>
                    <div class="menu-item" onclick="startFocus()">📖 陪我专注</div>
                </div>
            </div>
            
            <div class="tool-container">
                <div class="tool-btn" onclick="toggleMenu('note-menu')">✉️</div>
                <div id="note-menu" class="pop-menu">
                    <div class="menu-item" onclick="giveNote()">✉️ 抽张纸条</div>
                </div>
            </div>
        </div>
    </div>

    <div id="onboarding">
        <h2 style="margin-bottom: 30px; font-weight: 300;">你好呀，我是小白团子。<br>我该怎么称呼你呢？</h2>
        <input type="text" id="name-input" class="input-box" placeholder="你的名字..." maxlength="8">
        <button class="action-btn" onclick="saveName()">我们要一直在一起哦</button>
    </div>

    <div class="main-stage">
        <div id="focus-timer">25:00</div>
        <div class="speech-bubble" id="bubble">...</div>

        <div id="express-area" class="input-container">
            <textarea id="express-input" class="input-box textarea" placeholder="想对团子说点什么吗？" rows="3"></textarea>
            <div class="emotion-row">
                <button class="emo-btn happy" onclick="handleExpress('happy')">✨ 记录美好</button>
                <button class="emo-btn sad" onclick="handleExpress('sad')">💧 诉说忧伤</button>
                <button class="emo-btn worry" onclick="handleExpress('worry')">🔥 消化烦恼</button>
            </div>
        </div>

        <div class="tilt-box" id="tilt-box">
            <div class="breath-wrap" id="breath-wrap">
                <div class="spirit" id="spirit">
                    <div class="face" id="face">
                        <div class="eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                        <div class="blush-container">
                            <div class="blush"></div>
                            <div class="blush"></div>
                        </div>
                        <div class="mouth" id="mouth">
                            <div class="tongue"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <button id="exit-focus" class="action-btn" style="margin-top: 30px; display: none;" onclick="stopFocus()">不学啦，抱抱我</button>
    </div>

    <div class="dock" id="main-dock">
        <div class="dock-item active" onclick="switchMode('idle', this)">🏠</div>
        <div class="dock-item" onclick="switchMode('express', this)">✉️</div>
        <div class="dock-item" onclick="switchMode('breath', this)">🌬️</div>
        <div class="dock-item" onclick="switchMode('sleep', this)">🌙</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
